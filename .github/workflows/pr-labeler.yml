name: PR Labeler
on:
    pull_request:
        types: [opened]

jobs:
    pr-labeler:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - uses: TimonVS/pr-labeler-action@v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

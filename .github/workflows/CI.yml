name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6.0.3
      name: Clone
    - uses: actions/setup-dotnet@v5.3.0
      name: Install .NET Core
      with:
        dotnet-version: "9.0"
    - name: Restore
      working-directory: ./src
      run: |
        dotnet restore
    - name: Build
      working-directory: ./src/MSIExtract
      run: |
        dotnet build -c Release

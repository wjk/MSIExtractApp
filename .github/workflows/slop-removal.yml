name: PR Quality

permissions:
  contents: read
  issues: read
  pull-requests: write

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@v0.2.1
        with:
          max-failures: 4
          lock-pr: true
          blocked-terms: "BULLWINKLE"
          failure-add-pr-labels: "AI slop"
          failure-pr-message: |
            An automated process has determined that this pull request contains
            AI-generated content, and as such it has been closed. As a reminder,
            **no** AI-generated contributions are welcome in this repository.

            If you believe that this PR has been incorrectly determined to be
            generated by AI, please open an issue. Thanks!
